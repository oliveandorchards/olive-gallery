<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Olive and Orchard Gallery</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f5f1e8;
			--panel: rgba(255, 252, 245, 0.88);
			--panel-border: rgba(89, 79, 59, 0.14);
			--text: #2f2a22;
			--muted: #6f6658;
			--accent: #8a5f2f;
			--shadow: 0 18px 50px rgba(68, 52, 28, 0.16);
		}

		* {
			box-sizing: border-box;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(197, 161, 109, 0.22), transparent 35%),
				radial-gradient(circle at top right, rgba(142, 170, 122, 0.18), transparent 28%),
				linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
		}

		.page {
			width: min(1180px, calc(100% - 32px));
			margin: 0 auto;
			padding: 32px 0 48px;
		}

		header {
			position: relative;
			overflow: hidden;
			padding: 34px 28px;
			border: 1px solid var(--panel-border);
			border-radius: 28px;
			background: var(--panel);
			box-shadow: var(--shadow);
			backdrop-filter: blur(10px);
		}

		header::after {
			content: "";
			position: absolute;
			inset: auto -20% -55% auto;
			width: 280px;
			height: 280px;
			border-radius: 50%;
			background: radial-gradient(circle, rgba(138, 95, 47, 0.16), transparent 68%);
			pointer-events: none;
		}

		.eyebrow {
			margin: 0 0 12px;
			font-size: 0.82rem;
			letter-spacing: 0.24em;
			text-transform: uppercase;
			color: var(--accent);
			font-weight: 700;
		}

		h1 {
			margin: 0;
			font-family: "Palatino Linotype", "Book Antiqua", serif;
			font-size: clamp(2.4rem, 5vw, 4.8rem);
			line-height: 0.95;
			letter-spacing: -0.05em;
		}

		.subtitle {
			max-width: 620px;
			margin: 16px 0 0;
			font-size: 1.02rem;
			line-height: 1.65;
			color: var(--muted);
		}

		.stats {
			display: flex;
			gap: 16px;
			flex-wrap: wrap;
			margin-top: 22px;
		}

		.stat {
			padding: 12px 16px;
			min-width: 132px;
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.58);
			border: 1px solid rgba(89, 79, 59, 0.1);
		}

		.stat strong {
			display: block;
			font-size: 1.05rem;
			margin-bottom: 4px;
		}

		.stat span {
			font-size: 0.88rem;
			color: var(--muted);
		}

		.gallery {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
			gap: 18px;
			margin-top: 26px;
		}

		.photo-card {
			position: relative;
			overflow: hidden;
			aspect-ratio: 1 / 1;
			border-radius: 22px;
			background: #eadfcd;
			border: 1px solid rgba(89, 79, 59, 0.12);
			box-shadow: 0 10px 28px rgba(65, 49, 25, 0.12);
			cursor: pointer;
			isolation: isolate;
			transform: translateY(0);
			transition: transform 180ms ease, box-shadow 180ms ease;
		}

		.photo-card:hover,
		.photo-card:focus-visible {
			transform: translateY(-4px);
			box-shadow: 0 18px 34px rgba(65, 49, 25, 0.18);
			outline: none;
		}

		.photo-card img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.photo-card::after {
			content: attr(data-label);
			position: absolute;
			left: 0;
			right: 0;
			bottom: 0;
			padding: 18px 14px 12px;
			background: linear-gradient(180deg, rgba(27, 22, 16, 0) 0%, rgba(27, 22, 16, 0.7) 100%);
			color: #fff8ef;
			font-size: 0.9rem;
			letter-spacing: 0.04em;
			text-align: left;
		}

		.gallery-note {
			margin-top: 18px;
			color: var(--muted);
			font-size: 0.94rem;
			text-align: center;
		}

		.viewer {
			position: fixed;
			inset: 0;
			display: grid;
			place-items: center;
			padding: 20px;
			background: rgba(26, 20, 12, 0.82);
			opacity: 0;
			pointer-events: none;
			transition: opacity 180ms ease;
			z-index: 20;
		}

		.viewer.is-open {
			opacity: 1;
			pointer-events: auto;
		}

		.viewer-content {
			width: min(1100px, 100%);
			max-height: 92vh;
			display: grid;
			gap: 12px;
		}

		.viewer img {
			width: 100%;
			max-height: 82vh;
			object-fit: contain;
			border-radius: 22px;
			background: #0f0d0a;
			box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
		}

		.viewer-bar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			color: #f8f3ea;
			font-size: 0.95rem;
		}

		.close-btn {
			border: 0;
			border-radius: 999px;
			padding: 10px 14px;
			background: rgba(255, 255, 255, 0.12);
			color: inherit;
			cursor: pointer;
		}

		@media (max-width: 640px) {
			.page {
				width: min(100% - 20px, 1180px);
				padding-top: 18px;
			}

			header {
				padding: 24px 18px;
				border-radius: 22px;
			}

			.gallery {
				grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
				gap: 12px;
			}

			.viewer-bar {
				flex-direction: column;
				align-items: flex-start;
			}
		}
	</style>
</head>
<body>
	<main class="page">
		<header>
			<p class="eyebrow">Olive and Orchard</p>
			<h1>Image Gallery</h1>
			<p class="subtitle">
				A clean, simple photo grid for browsing the collection in the <strong>photos</strong> folder.
				Tap any image to view it larger.
			</p>
			<div class="stats" id="stats"></div>
		</header>

		<section aria-label="Photo gallery">
			<div class="gallery" id="gallery"></div>
			<p class="gallery-note">Click a photo to open a larger view. Press Escape to close it.</p>
		</section>
	</main>

	<div class="viewer" id="viewer" aria-hidden="true" role="dialog" aria-label="Image viewer">
		<div class="viewer-content">
			<div class="viewer-bar">
				<div id="viewerLabel">Preview</div>
				<button class="close-btn" type="button" id="closeViewer">Close</button>
			</div>
			<img id="viewerImage" alt="">
		</div>
	</div>

	<script>
		const imageFiles = [
			"1.jpeg",
			"2.jpeg",
			"3.jpeg",
			"4.jpeg",
			"5.jpeg",
			"6.jpeg",
			"7.jpeg",
			"8.jpeg",
			"9.jpeg",
			"10.jpeg",
			"12.jpeg",
			"13.jpeg",
			"14.jpeg",
			"15.jpeg",
			"16.jpeg",
			"17.jpeg",
			"18.jpeg",
			"19.jpeg",
			"20.jpeg",
			"21.jpeg",
			"22.jpeg",
			"oak-1.jpeg",
			"oak-2.jpeg",
			"oak-3.jpeg",
			"oak-4.jpeg",
			"olive-1.jpeg",
			"olive-2.jpeg"
		];

		const gallery = document.getElementById("gallery");
		const stats = document.getElementById("stats");
		const viewer = document.getElementById("viewer");
		const viewerImage = document.getElementById("viewerImage");
		const viewerLabel = document.getElementById("viewerLabel");
		const closeViewer = document.getElementById("closeViewer");

		stats.innerHTML = `
			<div class="stat"><strong>${imageFiles.length}</strong><span>Photos loaded</span></div>
			<div class="stat"><strong>Grid</strong><span>Responsive layout</span></div>
			<div class="stat"><strong>Click</strong><span>Open preview</span></div>
		`;

		imageFiles.forEach((fileName, index) => {
			const button = document.createElement("button");
			button.type = "button";
			button.className = "photo-card";
			button.dataset.label = `Photo ${index + 1}`;

			const image = document.createElement("img");
			image.src = `photos/${fileName}`;
			image.alt = `Photo ${index + 1}`;
			image.loading = "lazy";

			button.appendChild(image);
			button.addEventListener("click", () => openViewer(image.src, image.alt));
			gallery.appendChild(button);
		});

		function openViewer(src, label) {
			viewerImage.src = src;
			viewerImage.alt = label;
			viewerLabel.textContent = label;
			viewer.classList.add("is-open");
			viewer.setAttribute("aria-hidden", "false");
		}

		function closeOverlay() {
			viewer.classList.remove("is-open");
			viewer.setAttribute("aria-hidden", "true");
			viewerImage.src = "";
		}

		viewer.addEventListener("click", (event) => {
			if (event.target === viewer) {
				closeOverlay();
			}
		});

		closeViewer.addEventListener("click", closeOverlay);

		document.addEventListener("keydown", (event) => {
			if (event.key === "Escape" && viewer.classList.contains("is-open")) {
				closeOverlay();
			}
		});
	</script>
</body>
</html>
